<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>In/Out Tracking - Hostel Manager</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body>


  <aside class="sidebar">
    <div class="logo">
      <span class="material-symbols-outlined">apartment</span>
      <span>HostelHub</span>
    </div>
    <ul class="nav-links">
      <li>
        <a href="index.html" class="nav-item">
          <span class="material-symbols-outlined">dashboard</span>
          <span>Dashboard</span>
        </a>
      </li>
      <li>
        <a href="students.html" class="nav-item">
          <span class="material-symbols-outlined">group</span>
          <span>Students</span>
        </a>
      </li>
      <li>
        <a href="tracking.html" class="nav-item active">
          <span class="material-symbols-outlined">meeting_room</span>
          <span>In/Out Tracking</span>
        </a>
      </li>
    </ul>
  </aside>


  <main class="main-content">
    <div class="header">
      <h1>In/Out Tracking & Logs</h1>
    </div>

    <div class="grid-2" style="grid-template-columns: 1fr 2fr;">


      <div class="card">
        <h3>Mark Student Entry/Exit</h3>
        <form id="tracking-form" style="margin-top: 1.5rem;">
          <div class="form-group">
            <label for="studentSelect">Select Student</label>
            <select id="studentSelect" class="form-control" required>
              <option value="" disabled selected>Loading students...</option>
            </select>
          </div>

          <div class="form-group" style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="button" id="btn-in" class="btn btn-success" style="flex: 1;">
              <span class="material-symbols-outlined">login</span>
              Mark IN
            </button>
            <button type="button" id="btn-out" class="btn btn-danger" style="flex: 1;">
              <span class="material-symbols-outlined">logout</span>
              Mark OUT
            </button>
          </div>
        </form>
      </div>


      <div class="card">
        <h3>Recent Activity Logs</h3>
        <p class="text-secondary" style="margin-bottom: 1.5rem;">Real-time tracking of student movements.</p>

        <div id="loading" class="spinner hidden"></div>

        <div class="table-container">
          <table id="logs-table">
            <thead>
              <tr>
                <th>Time</th>
                <th>Student</th>
                <th>Room</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="logs-list">

            </tbody>
          </table>
        </div>
        <div id="empty-state" class="hidden" style="text-align: center; padding: 2rem;">
          <p class="text-secondary">No activity logs found.</p>
        </div>
      </div>

    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/tracking.js"></script>
</body>

</html>
